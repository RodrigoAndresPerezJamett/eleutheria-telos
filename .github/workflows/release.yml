name: Release

on:
  push:
    tags:
      - 'v*'  # triggers on v0.1.0, v1.0.0, etc.

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release — ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # needed to create GitHub releases and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            bundle_targets: deb,appimage
          - os: windows-latest
            label: Windows
            bundle_targets: msi,nsis
          - os: macos-latest
            label: macOS
            bundle_targets: dmg,app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Rust (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsqlite3-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.10" --locked

      - name: Build and bundle
        run: cargo tauri build
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing (macOS only — leave empty until code signing is set up)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.VERSION }}
          releaseName: Eleutheria Telos v${{ steps.version.outputs.VERSION }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Installation
            - **Linux:** Download `.AppImage` (portable) or `.deb` (Debian/Ubuntu/Nobara)
            - **Windows:** Download `.msi` installer
            - **macOS:** Download `.dmg`

            > ⚠️ **macOS / Windows unsigned warning:** Code signing is not yet configured.
            > macOS: right-click the app → Open to bypass Gatekeeper.
            > Windows: click "More info" → "Run anyway" in SmartScreen.
          releaseDraft: true   # creates as draft — you review before publishing
          prerelease: ${{ contains(github.ref, '-') }}  # v1.0.0-beta = prerelease
