<!-- marked.js loaded from bundled local asset for offline-first (D-015) -->
<script src="/assets/marked.min.js"></script>

<style>
  .prose h1 { font-size: 1.75em; font-weight: 700; line-height: 1.25; margin-top: 1em; margin-bottom: 0.5em; }
  .prose h2 { font-size: 1.4em;  font-weight: 600; line-height: 1.3;  margin-top: 0.9em; margin-bottom: 0.4em; }
  .prose h3 { font-size: 1.15em; font-weight: 600; line-height: 1.4;  margin-top: 0.8em; margin-bottom: 0.35em; }
  .prose h4 { font-size: 1em;    font-weight: 600; line-height: 1.5;  margin-top: 0.7em; margin-bottom: 0.3em; }
  .prose p  { margin-bottom: 0.75em; }
  .prose ul { list-style-type: disc;    padding-left: 1.5em; margin-bottom: 0.75em; }
  .prose ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.75em; }
  .prose li { margin-bottom: 0.25em; }
  .prose hr { border-color: var(--border); margin: 1em 0; }
</style>

<div style="display:flex;height:100%;gap:0;">

  <!-- Left: note list -->
  <div style="width:220px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);padding:20px 12px 20px 0;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0;">
      <h1 class="panel-title" style="margin:0;">Notes</h1>
      <button class="btn btn-primary btn-sm"
              hx-post="/api/notes"
              hx-target="#notes-list"
              hx-swap="afterbegin"
              hx-vals='{"title":"","content":""}'>
        + New
      </button>
    </div>

    <!-- Search notes -->
    <input type="text"
           name="q"
           placeholder="Search notes…"
           class="input"
           style="font-size:12px;padding:5px 8px;margin-bottom:10px;flex-shrink:0;"
           hx-get="/api/notes"
           hx-trigger="input changed delay:300ms"
           hx-target="#notes-list"
           hx-swap="innerHTML" />

    <!-- Note list -->
    <div id="notes-list"
         style="flex:1;overflow-y:auto;"
         hx-get="/api/notes"
         hx-trigger="load, noteUpdated from:body"
         hx-swap="innerHTML">
      <p style="font-size:13px;color:var(--text-muted);">Loading…</p>
    </div>
  </div>

  <!-- Right: editor area -->
  <div id="note-editor" style="flex:1;overflow-y:auto;padding:20px 0 20px 24px;">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;text-align:center;padding:24px;">
      <p style="font-size:14px;font-weight:500;color:var(--text-primary);margin:0;">Nothing selected</p>
      <p style="font-size:13px;color:var(--text-muted);margin:0;">Pick a note from the list, or hit + to write a new one.</p>
    </div>
  </div>

</div>
