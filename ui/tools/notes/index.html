<!-- marked.js loaded from bundled local asset for offline-first (D-015) -->
<script src="/assets/marked.min.js"></script>

<!-- Heading styles for markdown preview: Tailwind Preflight resets h1-h6 to
     inherit size; Typography plugin is not loaded from CDN, so add them here. -->
<style>
  .prose h1 { font-size: 1.75em; font-weight: 700; line-height: 1.25; margin-top: 1em; margin-bottom: 0.5em; }
  .prose h2 { font-size: 1.4em;  font-weight: 600; line-height: 1.3;  margin-top: 0.9em; margin-bottom: 0.4em; }
  .prose h3 { font-size: 1.15em; font-weight: 600; line-height: 1.4;  margin-top: 0.8em; margin-bottom: 0.35em; }
  .prose h4 { font-size: 1em;    font-weight: 600; line-height: 1.5;  margin-top: 0.7em; margin-bottom: 0.3em; }
  .prose p  { margin-bottom: 0.75em; }
  .prose ul { list-style-type: disc;    padding-left: 1.5em; margin-bottom: 0.75em; }
  .prose ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.75em; }
  .prose li { margin-bottom: 0.25em; }
  .prose hr { border-color: #374151; margin: 1em 0; }
</style>

<div id="tool-panel" class="flex h-full gap-4">

  <!-- Left: note list -->
  <div class="w-64 shrink-0 flex flex-col border-r border-gray-800 pr-4">

    <div class="flex items-center justify-between mb-3 shrink-0">
      <h2 class="text-base font-semibold text-gray-100">Notes</h2>
      <button class="text-xs px-2 py-1 rounded bg-blue-600 hover:bg-blue-500 text-white transition-colors"
              hx-post="/api/notes"
              hx-target="#notes-list"
              hx-swap="afterbegin"
              hx-vals='{"title":"","content":""}'>
        + New
      </button>
    </div>

    <!-- Search notes -->
    <input type="text"
           name="q"
           placeholder="Search notes…"
           class="mb-3 bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-gray-100 placeholder-gray-500 outline-none focus:border-blue-500 shrink-0"
           hx-get="/api/notes"
           hx-trigger="input changed delay:300ms"
           hx-target="#notes-list"
           hx-swap="innerHTML" />

    <!-- Note list -->
    <div id="notes-list"
         class="flex-1 overflow-y-auto"
         hx-get="/api/notes"
         hx-trigger="load, noteUpdated from:body"
         hx-swap="innerHTML">
      <p class="text-gray-500 text-sm">Loading…</p>
    </div>
  </div>

  <!-- Right: editor area -->
  <div id="note-editor" class="flex-1 overflow-y-auto">
    <div class="flex items-center justify-center h-full text-gray-600 text-sm">
      Select a note to edit
    </div>
  </div>

</div>
