<div class="panel"
     x-data="{ recording: false, elapsed: 0, timer: null }"
     x-init="
       fetch('http://127.0.0.1:' + window.__API_PORT__ + '/api/audio/state', {
         headers: { 'Authorization': 'Bearer ' + window.__SESSION_TOKEN__ }
       })
       .then(r => r.json())
       .then(d => {
         if (d.recording) {
           recording = true;
           elapsed = Math.max(0, Math.floor(Date.now() / 1000) - d.started_at);
           timer = setInterval(() => elapsed++, 1000);
         }
       })
       .catch(() => {})
     ">

  <div class="panel-header">
    <div>
      <h1 class="panel-title">Audio Recorder</h1>
      <p class="panel-subtitle">Record your microphone and save as mp3, wav, ogg, or flac.</p>
    </div>
  </div>

  <!-- ── Recording controls ───────────────────────────────────────────────── -->
  <div class="card" style="margin-bottom:16px;">

    <!-- Format selector — shown only when not recording -->
    <div x-show="!recording" style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <label style="font-size:12px;color:var(--text-muted);width:52px;flex-shrink:0;">Format:</label>
      <div style="display:flex;gap:12px;">
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text-primary);">
          <input type="radio" name="audio-format" value="mp3" checked> mp3
        </label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text-primary);">
          <input type="radio" name="audio-format" value="wav"> wav
        </label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text-primary);">
          <input type="radio" name="audio-format" value="ogg"> ogg
        </label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text-primary);">
          <input type="radio" name="audio-format" value="flac"> flac
        </label>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">

      <!-- Start button -->
      <button x-show="!recording"
              class="btn btn-primary"
              hx-post="/api/audio/record/start"
              hx-target="#audio-record-status"
              hx-swap="innerHTML"
              hx-vals="js:{format: document.querySelector('input[name=audio-format]:checked').value}"
              @click="
                recording = true;
                elapsed = 0;
                timer = setInterval(() => elapsed++, 1000);
              ">
        Start Recording
      </button>

      <!-- Stop button -->
      <button x-show="recording"
              class="btn btn-danger"
              hx-post="/api/audio/record/stop"
              hx-target="#audio-result"
              hx-swap="innerHTML"
              hx-indicator="#audio-stop-indicator"
              @click="
                recording = false;
                clearInterval(timer);
                timer = null;
                document.getElementById('audio-record-status').innerHTML = '';
              ">
        Stop Recording
      </button>

      <!-- Timer badge -->
      <span x-show="recording" style="font-size:12px;color:var(--destructive);font-family:monospace;">
        ● <span x-text="String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0')"></span>
      </span>

      <span id="audio-stop-indicator"
            class="htmx-indicator"
            style="font-size:12px;color:var(--text-muted);font-style:italic;">Saving…</span>
    </div>

    <div id="audio-record-status" style="margin-top:10px;font-size:12px;"></div>
  </div>

  <!-- ── Result area ────────────────────────────────────────────────────────── -->
  <div id="audio-result" style="margin-top:8px;"></div>

</div>
