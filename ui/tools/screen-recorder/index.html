<div class="panel"
     x-data="{ recording: false, elapsed: 0, timer: null }"
     x-init="
       fetch('http://127.0.0.1:' + window.__API_PORT__ + '/api/screen/state', {
         headers: { 'Authorization': 'Bearer ' + window.__SESSION_TOKEN__ }
       })
       .then(r => r.json())
       .then(d => {
         if (d.recording) {
           recording = true;
           elapsed = Math.max(0, Math.floor(Date.now() / 1000) - d.started_at);
           timer = setInterval(() => elapsed++, 1000);
         }
       })
       .catch(() => {})
     ">

  <div class="panel-header">
    <div>
      <h1 class="panel-title">Screen Recorder</h1>
      <p class="panel-subtitle">Records to ~/Videos/Eleutheria/ as mp4.</p>
    </div>
  </div>

  <!-- ── Recording controls ───────────────────────────────────────────────── -->
  <div class="card" style="margin-bottom:16px;">

    <!-- Options — shown only when not recording -->
    <div x-show="!recording" style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px;">

      <div style="display:flex;align-items:center;gap:12px;">
        <label style="font-size:12px;color:var(--text-muted);width:52px;flex-shrink:0;">Output:</label>
        <select id="screen-output-select"
                name="output"
                class="input"
                style="flex:1;font-size:12px;padding:5px 8px;"
                hx-get="/api/screen/outputs"
                hx-trigger="load"
                hx-swap="innerHTML">
          <option value="">Detecting…</option>
        </select>
      </div>

      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-primary);">
        <input type="checkbox"
               id="screen-audio-toggle"
               style="width:14px;height:14px;">
        Include microphone audio
      </label>

    </div>

    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">

      <button x-show="!recording"
              class="btn btn-primary"
              hx-post="/api/screen/start"
              hx-target="#screen-record-status"
              hx-swap="innerHTML"
              hx-vals="js:{
                audio:  document.getElementById('screen-audio-toggle').checked ? 'on' : '',
                output: document.getElementById('screen-output-select').value
              }"
              @click="
                recording = true;
                elapsed = 0;
                timer = setInterval(() => elapsed++, 1000);
              ">
        Start Recording
      </button>

      <button x-show="recording"
              class="btn btn-danger"
              hx-post="/api/screen/stop"
              hx-target="#screen-result"
              hx-swap="innerHTML"
              hx-indicator="#screen-stop-indicator"
              @click="
                recording = false;
                clearInterval(timer);
                timer = null;
                document.getElementById('screen-record-status').innerHTML = '';
              ">
        Stop Recording
      </button>

      <span x-show="recording" style="font-size:12px;color:var(--destructive);font-family:monospace;">
        ● <span x-text="String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0')"></span>
      </span>

      <span id="screen-stop-indicator"
            class="htmx-indicator"
            style="font-size:12px;color:var(--text-muted);font-style:italic;">Finalizing…</span>
    </div>

    <div id="screen-record-status" style="margin-top:10px;font-size:12px;"></div>
  </div>

  <!-- ── Hint ──────────────────────────────────────────────────────────────── -->
  <div class="card">
    <p style="font-size:12px;color:var(--text-muted);line-height:1.6;margin:0;">
      <span style="color:var(--text-secondary);font-weight:500;">To stop:</span>
      Switch back with Alt+Tab or your window switcher, navigate here, press Stop.
      The panel restores recording state automatically.
    </p>
  </div>

  <div id="screen-result" style="margin-top:12px;"></div>

</div>
