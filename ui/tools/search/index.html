<div class="panel" style="display:flex;flex-direction:column;height:100%;">

  <div class="panel-header" style="flex-shrink:0;">
    <div>
      <h1 class="panel-title">Search</h1>
      <p class="panel-subtitle">Search across notes and clipboard history.</p>
    </div>
  </div>

  <div style="margin-bottom:16px;flex-shrink:0;">
    <input type="text"
           name="q"
           autofocus
           placeholder="Search notes and clipboard…"
           class="input"
           hx-get="/api/search"
           hx-trigger="input changed delay:250ms"
           hx-target="#search-results"
           hx-swap="innerHTML" />
  </div>

  <div id="search-results" style="flex:1;overflow-y:auto;">
    <p style="font-size:13px;color:var(--text-muted);">Type to search across notes and clipboard.</p>
  </div>

</div>
