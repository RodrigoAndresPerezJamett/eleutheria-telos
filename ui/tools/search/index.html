<div class="panel" style="display:flex;flex-direction:column;height:100%;">

  <div class="panel-header" style="flex-shrink:0;">
    <div>
      <h1 class="panel-title">Search</h1>
      <p class="panel-subtitle">Search across notes and clipboard history.</p>
    </div>
  </div>

  <div style="margin-bottom:8px;flex-shrink:0;">
    <input type="text"
           name="q"
           autofocus
           placeholder="Search notes and clipboard…"
           class="input"
           hx-get="/api/search"
           hx-trigger="input changed delay:250ms"
           hx-target="#search-results"
           hx-swap="innerHTML" />
    <p style="margin-top:6px;font-size:11px;color:var(--text-muted);">
      Tip: press
      <kbd style="font-family:inherit;background:var(--bg-elevated);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px;">Ctrl</kbd>
      <kbd style="font-family:inherit;background:var(--bg-elevated);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px;">K</kbd>
      to open quick search from anywhere in the app.
    </p>
  </div>

  <div id="search-results" style="flex:1;overflow-y:auto;">
    <p style="font-size:13px;color:var(--text-muted);">Looking for something specific? Search across all your notes and clipboard history.</p>
  </div>

</div>
