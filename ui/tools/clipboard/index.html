<div class="panel" style="display:flex;flex-direction:column;height:100%;padding:0;"
     x-data="clipboardApp()" x-init="init()">

  <!-- Header -->
  <div class="panel-header" style="padding:16px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <h1 class="panel-title" style="margin:0;">Clipboard History</h1>
      <p class="panel-subtitle" style="margin:2px 0 0;">Everything you've copied, searchable and one-click to recopy.</p>
    </div>
    <button class="btn btn-ghost btn-sm"
            style="color:var(--destructive);border-color:var(--destructive);"
            hx-delete="/api/clipboard"
            hx-target="#clipboard-grid"
            hx-swap="innerHTML"
            hx-confirm="Clear all clipboard history?">
      Clear all
    </button>
  </div>

  <!-- Card grid — refreshes on load and when window regains focus (via custom event) -->
  <div id="clipboard-grid"
       style="flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;align-content:start;"
       hx-get="/api/clipboard"
       hx-trigger="load, clipboardRefresh from:body"
       hx-swap="innerHTML">
    <p style="font-size:13px;color:var(--text-muted);">Loading…</p>
  </div>

  <!-- Search bar pinned to bottom -->
  <div style="flex-shrink:0;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg-base);">
    <input type="text"
           name="q"
           placeholder="Search clipboard…"
           class="input"
           style="width:100%;font-size:13px;"
           hx-get="/api/clipboard"
           hx-trigger="input changed delay:300ms"
           hx-target="#clipboard-grid"
           hx-swap="innerHTML" />
  </div>

  <!-- Preview modal -->
  <div x-show="preview"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       style="position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;"
       @click.self="preview = null"
       @keydown.escape.window="preview = null">

    <div style="background:var(--bg-elevated);border-radius:var(--radius-lg);max-width:640px;width:100%;max-height:85%;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.4);">

      <!-- Modal header -->
      <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;">
        <span style="flex:1;font-size:12px;color:var(--text-muted);" x-text="preview?.ts || ''"></span>
        <button class="btn btn-ghost btn-sm" @click="preview = null" style="padding:4px 7px;">✕</button>
      </div>

      <!-- Scrollable content — click to copy -->
      <div style="flex:1;overflow-y:auto;padding:16px 20px;cursor:copy;"
           @click="copyContent()"
           title="Click anywhere to copy">
        <pre x-text="preview?.content"
             style="white-space:pre-wrap;word-break:break-all;font-size:13px;color:var(--text-primary);margin:0;font-family:inherit;line-height:1.65;"></pre>
      </div>

      <!-- Footer -->
      <div style="display:flex;align-items:center;gap:8px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;">
        <button class="btn btn-primary btn-sm" @click="copyContent()">
          <i data-lucide="clipboard" style="width:12px;height:12px;margin-right:4px;"></i>
          <span x-text="copyFeedback ? 'Copied!' : 'Copy'"></span>
        </button>
        <span x-show="copyFeedback" x-transition style="font-size:12px;color:var(--success);">✓ Copied to clipboard</span>
      </div>
    </div>
  </div>

</div>

<script>
(function () {

  window.clipboardOpenPreview = function (el) {
    document.dispatchEvent(new CustomEvent('clipboard:preview', {
      detail: {
        id:      el.dataset.clipId,
        content: el.dataset.clipContent,
        ts:      el.querySelector('span')?.textContent || '',
      }
    }));
  };

  // Refresh grid when the window regains focus (user switches back to app)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) htmx.trigger(document.body, 'clipboardRefresh');
  });

  window.clipboardApp = function () {
    return {
      preview:      null,
      copyFeedback: false,

      init() {
        document.addEventListener('clipboard:preview', e => {
          this.preview = e.detail;
        });
      },

      async copyContent() {
        if (!this.preview?.content) return;
        try {
          await navigator.clipboard.writeText(this.preview.content);
          this.copyFeedback = true;
          setTimeout(() => { this.copyFeedback = false; }, 1800);
        } catch (e) {
          console.warn('Clipboard write failed:', e);
        }
      },
    };
  };

})();
</script>
