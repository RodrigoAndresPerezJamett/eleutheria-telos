<div class="panel" style="display:flex;flex-direction:column;height:100%;">

  <div class="panel-header" style="flex-shrink:0;">
    <div>
      <h1 class="panel-title">Clipboard History</h1>
      <p class="panel-subtitle">Everything you've copied, searchable and one-click to recopy.</p>
    </div>
    <button class="btn btn-danger btn-sm"
            hx-delete="/api/clipboard"
            hx-target="#clipboard-list"
            hx-swap="innerHTML"
            hx-confirm="Clear all clipboard history?">
      Clear all
    </button>
  </div>

  <!-- Search -->
  <div style="margin-bottom:16px;flex-shrink:0;">
    <input type="text"
           name="q"
           placeholder="Search clipboard…"
           class="input"
           hx-get="/api/clipboard"
           hx-trigger="input changed delay:300ms"
           hx-target="#clipboard-list"
           hx-swap="innerHTML" />
  </div>

  <!-- List -->
  <div id="clipboard-list"
       style="flex:1;overflow-y:auto;"
       hx-get="/api/clipboard"
       hx-trigger="load, every 3s"
       hx-swap="innerHTML">
    <p style="font-size:13px;color:var(--text-muted);">Loading…</p>
  </div>

</div>
