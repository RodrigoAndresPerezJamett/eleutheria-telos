<!DOCTYPE html>
<div id="tool-panel" class="flex flex-col h-full p-6">

  <div class="mb-5">
    <h2 class="text-xl font-semibold text-gray-100">Voice to Text</h2>
    <p class="text-sm text-gray-400 mt-1">Record your microphone or upload an audio file to transcribe.</p>
  </div>

  <!-- ── Language selector ──────────────────────────────────────────────── -->
  <div class="flex items-center gap-3 mb-4">
    <label class="text-xs text-gray-400">Language:</label>
    <select id="voice-lang"
            class="text-xs bg-gray-800 border border-gray-700 rounded px-2 py-1 text-gray-200">
      <option value="auto">Auto-detect</option>
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="pt">Portuguese</option>
      <option value="it">Italian</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
    </select>
  </div>

  <!-- ── Record controls (Alpine.js for timer) ──────────────────────────── -->
  <div class="rounded-lg border border-gray-800 bg-gray-900 p-5 mb-4"
       x-data="{ recording: false, elapsed: 0, timer: null }"
       x-init="$el.addEventListener('htmx:afterRequest', () => {})">

    <div class="flex flex-wrap items-center gap-3">

      <!-- Start button — hidden while recording -->
      <button x-show="!recording"
              class="text-sm bg-blue-600 hover:bg-blue-500 text-white rounded px-4 py-2"
              hx-post="/api/voice/record/start"
              hx-target="#voice-record-status"
              hx-swap="innerHTML"
              @click="
                recording = true;
                elapsed = 0;
                timer = setInterval(() => elapsed++, 1000);
              ">
        Start Recording
      </button>

      <!-- Stop button — visible while recording -->
      <!-- hx-include picks up the hidden lang form so lang reaches the stop handler -->
      <button x-show="recording"
              class="text-sm bg-red-600 hover:bg-red-500 text-white rounded px-4 py-2"
              hx-post="/api/voice/record/stop"
              hx-target="#voice-result"
              hx-swap="innerHTML"
              hx-indicator="#voice-indicator"
              hx-include="#voice-stop-form"
              @click="
                recording = false;
                clearInterval(timer);
                timer = null;
                document.getElementById('voice-stop-lang').value = document.getElementById('voice-lang').value;
              ">
        Stop &amp; Transcribe
      </button>

      <!-- Timer badge -->
      <span x-show="recording" class="text-xs text-red-400 font-mono">
        ● <span x-text="String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0')"></span>
      </span>

      <span id="voice-indicator"
            class="htmx-indicator text-xs text-gray-400 italic">Transcribing…</span>
    </div>

    <!-- Status line updated by start handler -->
    <div id="voice-record-status" class="mt-3 text-xs"></div>
  </div>

  <!-- Hidden form that carries the lang field for the stop button -->
  <form id="voice-stop-form" class="hidden">
    <input type="hidden" name="lang" id="voice-stop-lang" value="auto">
  </form>

  <!-- ── File upload ──────────────────────────────────────────────────────── -->
  <div class="flex flex-wrap gap-3 mb-2 items-center">
    <form id="voice-file-form"
          hx-encoding="multipart/form-data">
      <input type="hidden" name="lang" id="voice-file-lang" value="auto">
      <label class="cursor-pointer text-sm border border-gray-600 hover:bg-gray-800 rounded px-4 py-2 text-gray-200 inline-block"
             onclick="document.getElementById('voice-file-lang').value = document.getElementById('voice-lang').value">
        Upload Audio File
        <input type="file"
               name="audio"
               accept="audio/wav,audio/mpeg,audio/ogg,audio/flac,audio/x-m4a,audio/mp4"
               class="hidden"
               hx-post="/api/voice/file"
               hx-target="#voice-result"
               hx-swap="innerHTML"
               hx-encoding="multipart/form-data"
               hx-trigger="change"
               hx-include="#voice-file-form"
               hx-indicator="#file-voice-indicator">
      </label>
    </form>
    <span id="file-voice-indicator"
          class="htmx-indicator text-xs text-gray-400 italic">Processing…</span>
  </div>

  <!-- ── Result area ────────────────────────────────────────────────────── -->
  <div id="voice-result" class="flex-1 overflow-y-auto mt-2">
    <!-- Populated by HTMX after recording stops or file upload -->
  </div>

</div>
