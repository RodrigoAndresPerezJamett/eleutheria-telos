<div class="panel" style="display:flex;flex-direction:column;height:100%;"
     x-data="{
       recording: false,
       elapsed: 0,
       timer: null,
       _stream: null, _audioCtx: null, _analyser: null, _waveAnim: null,
       async startWaveform() {
         try {
           this._stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
           this._audioCtx = new AudioContext();
           const src = this._audioCtx.createMediaStreamSource(this._stream);
           this._analyser = this._audioCtx.createAnalyser();
           this._analyser.fftSize = 512;
           src.connect(this._analyser);
           const canvas = document.getElementById('voice-waveform');
           const ctx2d = canvas.getContext('2d');
           const buf = new Uint8Array(this._analyser.frequencyBinCount);
           const draw = () => {
             if (!this.recording) return;
             this._waveAnim = requestAnimationFrame(draw);
             this._analyser.getByteTimeDomainData(buf);
             ctx2d.clearRect(0, 0, canvas.width, canvas.height);
             ctx2d.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#6c8ebf';
             ctx2d.lineWidth = 2;
             ctx2d.beginPath();
             const sw = canvas.width / buf.length;
             buf.forEach((v, i) => {
               const y = (v / 128) * (canvas.height / 2);
               i === 0 ? ctx2d.moveTo(0, y) : ctx2d.lineTo(i * sw, y);
             });
             ctx2d.lineTo(canvas.width, canvas.height / 2);
             ctx2d.stroke();
           };
           draw();
         } catch(e) { /* mic unavailable — waveform is optional */ }
       },
       stopWaveform() {
         if (this._waveAnim) cancelAnimationFrame(this._waveAnim);
         if (this._analyser) this._analyser.disconnect();
         if (this._audioCtx) this._audioCtx.close().catch(() => {});
         if (this._stream) this._stream.getTracks().forEach(t => t.stop());
         this._waveAnim = this._analyser = this._audioCtx = this._stream = null;
         const c = document.getElementById('voice-waveform');
         if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
       }
     }"
     x-init="$el.addEventListener('htmx:afterRequest', () => {})">

  <div class="panel-header">
    <div>
      <h1 class="panel-title">Voice to Text</h1>
      <p class="panel-subtitle">Record your microphone or upload an audio file to transcribe.</p>
    </div>
  </div>

  <!-- ── Language selector ──────────────────────────────────────────────── -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-shrink:0;">
    <label style="font-size:12px;color:var(--text-muted);">Language:</label>
    <select id="voice-lang" class="input" style="width:auto;font-size:12px;padding:5px 8px;">
      <option value="auto">Auto-detect</option>
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="pt">Portuguese</option>
      <option value="it">Italian</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
    </select>
  </div>

  <!-- ── Record controls ────────────────────────────────────────────────── -->
  <div class="card" style="margin-bottom:16px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">

      <button x-show="!recording"
              class="btn btn-primary"
              hx-post="/api/voice/record/start"
              hx-target="#voice-record-status"
              hx-swap="innerHTML"
              @click="
                recording = true;
                elapsed = 0;
                timer = setInterval(() => elapsed++, 1000);
                startWaveform();
              ">
        Start Recording
      </button>

      <button x-show="recording"
              class="btn btn-danger"
              hx-post="/api/voice/record/stop"
              hx-target="#voice-result"
              hx-swap="innerHTML"
              hx-indicator="#voice-indicator"
              hx-include="#voice-stop-form"
              @click="
                recording = false;
                clearInterval(timer);
                timer = null;
                stopWaveform();
                document.getElementById('voice-stop-lang').value = document.getElementById('voice-lang').value;
              ">
        Stop &amp; Transcribe
      </button>

      <span x-show="recording" style="font-size:12px;color:var(--destructive);font-family:monospace;">
        ● <span x-text="String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0')"></span>
      </span>

      <span id="voice-indicator"
            class="htmx-indicator"
            style="font-size:12px;color:var(--text-muted);font-style:italic;">Transcribing…</span>
    </div>

    <!-- Live waveform — only visible while recording -->
    <canvas id="voice-waveform"
            x-show="recording"
            x-transition
            width="800" height="48"
            style="width:100%;height:48px;margin-top:10px;border-radius:var(--radius-sm);background:var(--bg-base);display:block;"></canvas>

    <div id="voice-record-status" style="margin-top:10px;font-size:12px;"></div>
  </div>

  <!-- Hidden form that carries the lang field for the stop button -->
  <form id="voice-stop-form" style="display:none;">
    <input type="hidden" name="lang" id="voice-stop-lang" value="auto">
  </form>

  <!-- ── File upload ──────────────────────────────────────────────────────── -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-shrink:0;">
    <form id="voice-file-form" hx-encoding="multipart/form-data">
      <input type="hidden" name="lang" id="voice-file-lang" value="auto">
      <label class="btn btn-secondary"
             style="cursor:pointer;"
             onclick="document.getElementById('voice-file-lang').value = document.getElementById('voice-lang').value">
        Upload Audio File
        <input type="file"
               name="audio"
               accept="audio/wav,audio/mpeg,audio/ogg,audio/flac,audio/x-m4a,audio/mp4"
               style="display:none;"
               hx-post="/api/voice/file"
               hx-target="#voice-result"
               hx-swap="innerHTML"
               hx-encoding="multipart/form-data"
               hx-trigger="change"
               hx-include="#voice-file-form"
               hx-indicator="#file-voice-indicator">
      </label>
    </form>
    <span id="file-voice-indicator"
          class="htmx-indicator"
          style="font-size:12px;color:var(--text-muted);font-style:italic;">Processing…</span>
  </div>

  <!-- ── Result area ────────────────────────────────────────────────────── -->
  <div id="voice-result" style="flex:1;overflow-y:auto;margin-top:8px;"></div>

</div>
