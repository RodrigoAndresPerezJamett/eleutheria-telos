<div class="panel">
  <div class="panel-header">
    <div>
      <h1 class="panel-title">Translate</h1>
      <p class="panel-subtitle">Translate text between languages using offline models.</p>
    </div>
  </div>

  <!-- Language pair selector and form — loaded dynamically based on installed models -->
  <div id="translate-langs"
       hx-get="/api/translate/langs"
       hx-trigger="load"
       hx-swap="innerHTML">
    <p style="font-size:13px;color:var(--text-muted);">Loading language packs…</p>
  </div>
</div>
