<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950 text-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eleutheria Telos</title>

  <!-- Tailwind CSS (CDN — will be replaced with compiled build in Phase 5) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX — bundled locally for offline-first (D-015) -->
  <script src="/assets/htmx.min.js"></script>

  <!-- Alpine.js — bundled locally for offline-first (D-015) -->
  <script src="/assets/alpine.min.js" defer></script>

  <script>
    // HTMX 2.x defaults: selfRequestsOnly=true blocks cross-origin requests.
    // Our shell is on tauri://localhost but Axum is http://127.0.0.1:{PORT}.
    // Disable the restriction so HTMX can reach the API server.
    htmx.config.selfRequestsOnly = false;

    // Injected by Tauri initialization_script before any page scripts run.
    // Fallback values used only when not running inside Tauri (browser preview).
    if (!window.__SESSION_TOKEN__) window.__SESSION_TOKEN__ = 'dev-token';
    if (!window.__API_PORT__)      window.__API_PORT__      = 47821;

    // Configure HTMX:
    //   1. Always send the session token.
    //   2. Rewrite relative paths (/tools/..., /api/...) to the Axum server.
    //      This is needed because the shell is loaded from tauri://localhost/
    //      (static file) while API calls must go to http://127.0.0.1:{PORT}/.
    document.addEventListener('htmx:configRequest', function (evt) {
      evt.detail.headers['Authorization'] = 'Bearer ' + window.__SESSION_TOKEN__;

      const p = evt.detail.path;
      if (!p || p.startsWith('http://127.0.0.1:')) return; // already pointing at Axum

      // HTMX 2.x resolves relative paths to absolute tauri:// URLs for elements
      // injected via dynamic swap. Extract pathname+search regardless of format.
      const apiPath = p.startsWith('/') ? p : new URL(p).pathname + (new URL(p).search || '');
      evt.detail.path = 'http://127.0.0.1:' + window.__API_PORT__ + apiPath;
    });

    // After every swap into #tool-panel, force-process the new content so that
    // hx-trigger="load" elements inside swapped partials are properly initialized.
    // htmx.ajax() uses document.body as the source element (no real source), which
    // can cause the post-swap Ae() task to miss child initialization in some builds.
    document.addEventListener('htmx:afterSwap', function (evt) {
      if (evt.detail.target && evt.detail.target.id === 'tool-panel') {
        htmx.process(evt.detail.target);
      }
    });

    // App init: optionally confirm token+port via Tauri invoke, then load
    // the default tool panel. initialization_script already set the values;
    // invoke is only called if the function is actually available in this
    // context (it is not always exposed without withGlobalTauri: true).
    async function initApp() {
      try {
        const invoke =
          typeof window.__TAURI__?.core?.invoke === 'function'
            ? window.__TAURI__.core.invoke
            : typeof window.__TAURI__?.invoke === 'function'
              ? window.__TAURI__.invoke
              : null;
        if (invoke) {
          window.__SESSION_TOKEN__ = await invoke('get_session_token');
          window.__API_PORT__      = await invoke('get_api_port');
        }
      } catch (e) {
        // initialization_script already set the values — proceed with those.
      }
      // Load the default tool panel using the confirmed token and port.
      // Pass the full absolute URL so htmx:configRequest path-rewriting is not needed.
      const token = window.__SESSION_TOKEN__;
      const port  = window.__API_PORT__;
      htmx.ajax('GET', 'http://127.0.0.1:' + port + '/tools/clipboard', {
        target:  '#tool-panel',
        swap:    'innerHTML',
        headers: { 'Authorization': 'Bearer ' + token }
      });
    }

    document.addEventListener('DOMContentLoaded', initApp);
  </script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    .nav-item.active { background-color: #1f2937; }
    /* HTMX request indicator: hidden by default, shown while request is in-flight */
    .htmx-indicator { display: none; }
    .htmx-indicator.htmx-request { display: inline; }
  </style>
</head>

<body class="h-full flex"
      x-data="{ activeTool: 'clipboard', paletteOpen: false }"
      @keydown.ctrl.k.window.prevent="paletteOpen = true"
      @keydown.escape.window="paletteOpen = false">

  <!-- ── Sidebar (desktop ≥1024px) ──────────────────────────────────────── -->
  <nav id="sidebar"
       class="hidden lg:flex flex-col w-52 shrink-0 bg-gray-900 border-r border-gray-800 py-4">

    <div class="px-4 mb-6">
      <span class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Eleutheria</span>
    </div>

    <ul class="flex-1 space-y-1 px-2">
      <li>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
                :class="{ 'active': activeTool === 'clipboard' }"
                hx-get="/tools/clipboard"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'clipboard'">
          <span class="text-lg">📋</span>
          <span>Clipboard</span>
        </button>
      </li>
      <li>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
                :class="{ 'active': activeTool === 'notes' }"
                hx-get="/tools/notes"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'notes'">
          <span class="text-lg">📝</span>
          <span>Notes</span>
        </button>
      </li>
      <li>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
                :class="{ 'active': activeTool === 'voice' }"
                hx-get="/tools/voice"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'voice'">
          <span class="text-lg">🎙️</span>
          <span>Voice</span>
        </button>
      </li>
      <li>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
                :class="{ 'active': activeTool === 'ocr' }"
                hx-get="/tools/ocr"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'ocr'">
          <span class="text-lg">🔤</span>
          <span>OCR</span>
        </button>
      </li>
      <li>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
                :class="{ 'active': activeTool === 'translate' }"
                hx-get="/tools/translate"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'translate'">
          <span class="text-lg">🌐</span>
          <span>Translate</span>
        </button>
      </li>
      <li>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
                :class="{ 'active': activeTool === 'search' }"
                hx-get="/tools/search"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'search'">
          <span class="text-lg">🔍</span>
          <span>Search</span>
        </button>
      </li>
    </ul>

    <div class="px-2 mt-auto space-y-1">
      <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
              :class="{ 'active': activeTool === 'models' }"
              hx-get="/tools/models"
              hx-target="#tool-panel"
              hx-swap="innerHTML"
              @click="activeTool = 'models'">
        <span class="text-lg">🧠</span>
        <span>Models</span>
      </button>
      <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors"
              :class="{ 'active': activeTool === 'settings' }"
              hx-get="/tools/settings"
              hx-target="#tool-panel"
              hx-swap="innerHTML"
              @click="activeTool = 'settings'">
        <span class="text-lg">⚙️</span>
        <span>Settings</span>
      </button>
    </div>
  </nav>

  <!-- ── Icon-only sidebar (tablet 640px–1023px) ───────────────────────── -->
  <nav id="sidebar-tablet"
       class="hidden sm:flex lg:hidden flex-col w-14 shrink-0 bg-gray-900 border-r border-gray-800 py-4 items-center">
    <ul class="flex-1 space-y-2">
      <li>
        <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
                title="Clipboard"
                hx-get="/tools/clipboard"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'clipboard'">📋</button>
      </li>
      <li>
        <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
                title="Notes"
                hx-get="/tools/notes"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'notes'">📝</button>
      </li>
      <li>
        <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
                title="Voice"
                hx-get="/tools/voice"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'voice'">🎙️</button>
      </li>
      <li>
        <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
                title="OCR"
                hx-get="/tools/ocr"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'ocr'">🔤</button>
      </li>
      <li>
        <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
                title="Translate"
                hx-get="/tools/translate"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'translate'">🌐</button>
      </li>
      <li>
        <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
                title="Search"
                hx-get="/tools/search"
                hx-target="#tool-panel"
                hx-swap="innerHTML"
                @click="activeTool = 'search'">🔍</button>
      </li>
    </ul>
    <div class="mt-auto flex flex-col gap-1">
      <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
              title="Models"
              hx-get="/tools/models"
              hx-target="#tool-panel"
              hx-swap="innerHTML"
              @click="activeTool = 'models'">🧠</button>
      <button class="nav-item p-2 rounded-lg hover:bg-gray-800 transition-colors"
              title="Settings"
              hx-get="/tools/settings"
              hx-target="#tool-panel"
              hx-swap="innerHTML"
              @click="activeTool = 'settings'">⚙️</button>
    </div>
  </nav>

  <!-- ── Main content ───────────────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <div id="tool-panel"
         class="flex-1 overflow-y-auto p-6">
      <div class="flex items-center justify-center h-full text-gray-600">
        Loading…
      </div>
    </div>

  </main>

  <!-- ── Bottom nav (mobile <640px) ────────────────────────────────────── -->
  <nav id="bottom-nav"
       class="sm:hidden fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 flex justify-around py-2 z-50">
    <button class="flex flex-col items-center gap-1 text-xs p-2"
            hx-get="/tools/clipboard"
            hx-target="#tool-panel"
            hx-swap="innerHTML"
            @click="activeTool = 'clipboard'">
      <span class="text-xl">📋</span>
      <span>Clip</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-xs p-2"
            hx-get="/tools/notes"
            hx-target="#tool-panel"
            hx-swap="innerHTML"
            @click="activeTool = 'notes'">
      <span class="text-xl">📝</span>
      <span>Notes</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-xs p-2"
            hx-get="/tools/voice"
            hx-target="#tool-panel"
            hx-swap="innerHTML"
            @click="activeTool = 'voice'">
      <span class="text-xl">🎙️</span>
      <span>Voice</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-xs p-2"
            hx-get="/tools/ocr"
            hx-target="#tool-panel"
            hx-swap="innerHTML"
            @click="activeTool = 'ocr'">
      <span class="text-xl">🔤</span>
      <span>OCR</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-xs p-2"
            hx-get="/tools/settings"
            hx-target="#tool-panel"
            hx-swap="innerHTML"
            @click="activeTool = 'settings'">
      <span class="text-xl">⚙️</span>
      <span>More</span>
    </button>
  </nav>


  <!-- ── Ctrl+K Command Palette ─────────────────────────────────────────── -->
  <div x-show="paletteOpen"
       x-transition.opacity
       class="fixed inset-0 z-50 flex items-start justify-center pt-24 bg-black/60"
       @click.self="paletteOpen = false">
    <div class="w-full max-w-lg bg-gray-900 border border-gray-700 rounded-xl shadow-2xl overflow-hidden"
         @click.stop="">
      <input x-ref="paletteInput"
             x-effect="if (paletteOpen) $nextTick(() => $refs.paletteInput.focus())"
             @input.stop=""
             type="text"
             name="q"
             placeholder="Search notes and clipboard…"
             class="w-full bg-transparent px-4 py-3 text-gray-100 placeholder-gray-500 outline-none border-b border-gray-700 text-sm"
             hx-get="/api/search"
             hx-trigger="input changed delay:250ms"
             hx-target="#palette-results"
             hx-swap="innerHTML"
             @keydown.escape.stop="paletteOpen = false" />
      <div id="palette-results" class="max-h-72 overflow-y-auto py-1">
        <p class="text-xs text-gray-600 px-3 py-2">Type to search…</p>
      </div>
      <div class="border-t border-gray-800 px-3 py-2 flex gap-4">
        <span class="text-xs text-gray-600">↵ open &nbsp; Esc close</span>
      </div>
    </div>
  </div>

</body>
</html>
